name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        env:
          VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_PASSWORD: "Ttd@2025#Kawaii!"
          KEY_PASSWORD: "Ttd@2025#Kawaii!"
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/release/app-release.apk apk-output/ThingsToDo-v1.${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThingsToDo-APK
          path: apk-output/ThingsToDo-v1.${{ github.run_number }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: ThingsToDo v1.${{ github.run_number }}
          body: |
            APK generada automáticamente desde el commit ${{ github.sha }}

            **Instalar:** Descarga el archivo .apk y ábrelo en tu Android.
            *(Puede que necesites activar "Instalar apps de fuentes desconocidas" en Ajustes → Seguridad)*
          files: apk-output/ThingsToDo-v1.${{ github.run_number }}.apk
          draft: false
          prerelease: false
