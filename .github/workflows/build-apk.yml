name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.json'
      - 'src/**'
      - '.github/workflows/build-apk.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install npm dependencies and sync Capacitor
        run: |
          npm ci
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/ThingsToDo-v1.${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ThingsToDo-APK
          path: out/ThingsToDo-v1.${{ github.run_number }}.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: "ThingsToDo APK v1.${{ github.run_number }}"
          body: |
            APK lista para instalar en Android.

            Descarga `ThingsToDo-v1.${{ github.run_number }}.apk` e instálala en tu dispositivo.
            *(Puede que necesites activar "Instalar apps de fuentes desconocidas" en Ajustes → Seguridad)*
          files: out/ThingsToDo-v1.${{ github.run_number }}.apk
          draft: false
